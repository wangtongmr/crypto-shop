  
<!DOCTYPE html>  
<html lang="zh-CN">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>简单商城页面</title>  
    <style>  
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
        }  
        body {  
            font-family: Arial, sans-serif;  
            line-height: 1.6;  
            background-color: #f4f4f4;  
        }  
        header {  
            background: #333;  
            color: white;  
            padding: 1rem;  
            text-align: center;
            position: relative; 
        }
        .donate {
          padding: 1rem; 
          font-size: 1rem;
          color: red;
          position: absolute;
          right: 1rem;
        }
        .container {  
            max-width: 1200px;  
            margin: 0 auto;  
            padding: 20px;  
        }  
        .product-grid {  
            display: grid;  
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));  
            gap: 20px;  
        }  
        .card {  
            background: white;  
            border: 1px solid #ddd;  
            border-radius: 5px;  
            overflow: hidden;  
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);  
        }  
        .card img {  
            width: 100%;  
            height: 200px;  
            object-fit: cover;  
        }  
        .card-content {  
            padding: 15px;  
        }  
        .card h3 {  
            margin-bottom: 10px;  
        }  
        .price {  
            color: #e63946;  
            font-weight: bold;  
            font-size: 1.2em;  
        }  
        footer {  
            background: #333;  
            color: white;  
            text-align: center;  
            padding: 1rem;  
            position: fixed;  
            bottom: 0;  
            width: 100%;  
        }
        @media (max-width: 768px) {  
            .product-grid {  
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));  
            }  
        }  
    </style>  
</head>  
<body>  
    <header>  
        <h1>简单商城<a class="donate" href="https://nowpayments.io/donation/donate.crypto">捐赠</a></h1>
    </header>
